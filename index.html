<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Website Saya</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Navbar -->
    <header>
        <div class="container nav">
            <h2>Brand</h2>
            <nav>
                <a href="#">Home</a>
                <a href="#">About</a>
                <a href="#">Portfolio</a>
            </nav>
        </div>
    </header>

    <!-- Hero -->
    <section class="hero container">
        <div class="hero-text">
            <h1>Selamat Datang di Website Saya</h1>
            <p>Ini adalah contoh website sederhana menggunakan HTML & CSS Grid.</p>
            <button>Pelajari Lebih Lanjut</button>
        </div>
        <div class="hero-img">
            <img src="https://via.placeholder.com/300" alt="profile">
        </div>
    </section>

    <!-- About -->
    <section class="about container">
        <h2>About Me</h2>
        <div class="about-grid">
            <div>Nama: Eka</div>
            <div>Pendidikan: S1 TI</div>
            <div>Pekerjaan: Programmer</div>
            <div>Email: eka@email.com</div>
            <div>Hobi: Coding</div>
            <div>Alamat: Sumenep</div>
        </div>
    </section>

    <!-- Portfolio -->
    <section class="portfolio container">
        <h2>Portfolio</h2>
        <div class="portfolio-grid">
            <div class="card">Project 1</div>
            <div class="card">Project 2</div>
            <div class="card">Project 3</div>
        </div>
    </section>

</body>
</html>
